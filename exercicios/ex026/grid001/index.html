<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid na prática</title>
    <style>
        .conteiner {
            border: 3px solid black;
            height: 250px;
            display: grid;
            grid-template-columns: 50px 50px 50px 50px;/*colocando o conteudo em coluna e definindo o camanho de cada uma delas. Para adicionar mais coluna, basta adicionar mais valores*/
            grid-template-rows: auto;
            gap: 10px;
        }
        .item{
            border: 2px solid red;
            padding: 5px;
        }
    </style>
</head>
<body>
    <div class="conteiner">
        <div class="item">A</div>
        <div class="item">B</div>
        <div class="item">C</div> 
        <div class="item">D</div>
        <div class="item">E</div>
        <div class="item">F</div>
        <div class="item">G</div>
        <div class="item">H</div>
    </div>
</body>
</html>
